<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrinho - BEAMDEEP</title>
    <link rel="stylesheet" href="css.css">
</head>
<body>
    <header class="navbar">
        <div class="logo" style="display: flex;"> 
            <img src="png/beam.png" alt="Logo" style="height: 1em; width: auto;"> 
            BEAM<span>DEEP</span>
        </div>
        <button class="cart-btn"><img src="png/saco.png" style="width: 40px; height: 40px;"> Carrinho (<span id="cart-count">0</span>)</button>
    </header>

    <div class="container">
         <a href="pginicial.html" ; class="back-button"  style="color: var(white); font-weight: bold;font-size: 1.2rem ;margin: 0px 2 5px; display:inline-table;"><strong> <span style="font-size: 1rem; font-style: center; "> ← </strong></span> Voltar à Loja </a> </div>
        <h1 style="text-align:center; margin:30px 0; color:white;">Seu Carrinho</h1>
        
        <div id="cart-items"></div>

        <div style="text-align:right; margin:30px 0;">
            <h2>Total: R$ <span id="total-price">0.00</span></h2>
            <button onclick="window.location.href='comprar.html'" style="background:#10b981; ">
    Finalizar Compra
</button>
        </div>
    </div>

    <script src="java.js"></script>
    <script>
        function renderizarCarrinho() {
            const container = document.getElementById('cart-items');
            const totalEl = document.getElementById('total-price');
            let html = '';
            let total = 0;

            carrinho.forEach((item, index) => {
                const subtotal = item.preco * item.quantidade;
                total += subtotal;
                html += `
                    <div style="display:flex; background:var(--bg-card); padding:15px; border-radius:15px; margin-bottom:15px;">
                        <img src="${item.img}" style="width:100px; height:100px; object-fit:contain; margin-right:20px;">
                        <div style="flex:1;">
                            <h3>${item.nome}</h3>
                            <p>R$ ${item.preco.toFixed(2)} × ${item.quantidade}</p>
                        </div>
                        <div style="text-align:right;">
                            <p><strong>R$ ${subtotal.toFixed(2)}</strong></p>
                            <button onclick="removerDoCarrinho(${index})" style="color:red; background:none; border:none; cursor:pointer;">Remover</button>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html || '<p style="text-align:center; color:#ddd;">Seu carrinho está vazio.</p>';
            totalEl.textContent = total.toFixed(2);
            document.getElementById('cart-count').textContent = carrinho.reduce((a, b) => a + b.quantidade, 0);
        }

        function removerDoCarrinho(index) {
            carrinho.splice(index, 1);
            localStorage.setItem('carrinho', JSON.stringify(carrinho));
            renderizarCarrinho();
            atualizarContadorCarrinho();
        }

        function finalizarCompra() {
            if (carrinho.length === 0) return alert("Carrinho vazio!");

            carrinho = [];
            localStorage.setItem('carrinho', JSON.stringify(carrinho));
            renderizarCarrinho();
            atualizarContadorCarrinho();
        }

        // Inicializa
        document.addEventListener('DOMContentLoaded', renderizarCarrinho);
    </script>
</body>
</html>
